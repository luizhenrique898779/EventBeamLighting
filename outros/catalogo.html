<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Catálogo EB Lighting</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* FUNDO */
        body {
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top left, #c084fc44, transparent 50%),
                radial-gradient(circle at bottom right, #a855f744, transparent 50%),
                linear-gradient(135deg, #c084fc 0%, #a855f7 25%, #7c3aed 50%, #4c1d95 75%, #000000 100%);
            color: #fff;
            margin: 0;
            padding: 20px;
            overflow-y: auto;
            min-height: 100vh;
        }

        /* GRID DE PONTOS */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(#ffffff12 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        /* Conteúdo em primeiro plano */
        header,
        h1,
        .form-reserva {
            position: relative;
            z-index: 2;
        }

        h1 {
            text-align: center;
            color: #00ffcc;
        }

        .navbar {
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #00ffcc;
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links li a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }

        .nav-links li a:hover {
            color: #00ffcc;
        }

        #adminBtn {
            background: #7c3aed;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        #adminBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 10px #7c3aed;
        }

        .form-reserva {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }

        input,
        textarea {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 5px;
        }

        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }

        button:hover {
            background: #00cc99;
        }

        .item-carrinho {
            background: #262626;
            padding: 10px;
            border-radius: 5px;
            margin: 5px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 5px;
        }

        .item-carrinho .quant-btn {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 0 4px;
        }

        .item-carrinho .quant-btn:hover {
            background: #00cc99;
        }

        .item-carrinho .excluir-btn {
            background: #e55353;
            color: #fff;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .item-carrinho .excluir-btn:hover {
            background: #c03939;
        }

        /* Catálogo de Produtos */
        .produtos-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
            position: relative;
            z-index: 2;
        }

        .produto-card {
            background: #1a1a1a;
            border: 2px solid #7c3aed;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s;
        }

        .produto-card:hover {
            background: #262626;
            border-color: #00ffcc;
            box-shadow: 0 0 15px #7c3aed;
            transform: translateY(-5px);
        }

        .produto-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .produto-card h3 {
            color: #00ffcc;
            margin: 10px 0;
            font-size: 16px;
        }

        .produto-card p {
            color: #ccc;
            margin: 5px 0;
            font-size: 14px;
        }

        .preco {
            color: #00ffcc;
            font-weight: bold;
            font-size: 18px;
            margin: 10px 0;
        }

        .produto-card button {
            width: 100%;
            background: #7c3aed;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .produto-card button:hover {
            background: #00ffcc;
            color: #000;
        }
    </style>
    <script src="../auth.js"></script>
</head>

<body>
    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <h1 class="logo">EB Lighting</h1>
            <ul class="nav-links">
                <li><a href="../inicio/inicio.html">Início</a></li>
                <li><a href="../outros/catalogo.html">Catálogo</a></li>
                <li><a href="../outros/orcamento.html">Orçamento</a></li>
                <li><a href="../outros/contato.html">Contato</a></li>
            </ul>
            <button id="adminBtn">🔐 Admin</button>
        </nav>
    </header>

    <h1>Catálogo EB Lighting</h1>

    <!-- Catálogo de Produtos Disponíveis -->
    <div class="produtos-container" id="produtos"></div>

    <!-- Resumo do Carrinho -->
    <div id="resumoCarrinho"
        style="position: fixed; top: 80px; right: 30px; background: #1a1a1a; border: 2px solid #00ffcc; color: #fff; padding: 15px; border-radius: 10px; z-index: 99; display: none; min-width: 200px;">
        <h3 style="margin: 0 0 10px 0; color: #00ffcc; font-size: 14px;">📦 CARRINHO</h3>
        <div id="resumoItens" style="font-size: 13px; margin-bottom: 10px;">Vazio</div>
        <div id="resumoTotal"
            style="font-weight: bold; color: #00ffcc; border-top: 1px solid #00ffcc22; padding-top: 10px;">Total: R$
            0,00</div>
    </div>

    <!-- Carrinho -->
    <div class="form-reserva">
        <h2>Seu Carrinho</h2>
        <div id="listaItens"></div>
        <p id="valorTotal">Valor total: R$ 0,00</p>

        <h2>Finalizar Reserva</h2>
        <input type="text" id="nome" placeholder="Seu nome">
        <input type="text" id="email" placeholder="Seu email">
        <input type="text" id="telefone" placeholder="Seu telefone">
        <input type="text" id="local" placeholder="Local do evento">
        <input type="date" id="data">
        <textarea id="textoExtra" placeholder="Observações adicionais..."></textarea>
        <button onclick="finalizarReserva()">Enviar para WhatsApp</button>
    </div>

    <script>
        // Produtos (carregados do localStorage ou padrão)
        let produtos = JSON.parse(localStorage.getItem("produtos")) || [
            { nome: "Laser RGS 3W", foto: "https://via.placeholder.com/200", preco: 200, estoque: 3 },
            { nome: "Máquina de Fumaça 1500W", foto: "https://via.placeholder.com/200", preco: 150, estoque: 10 }
        ];

        // se havia versões mais antigas com o item removido, filtramos para evitar reaparecer
        if (Array.isArray(produtos)) {
            const limpa = produtos.filter(p => p.nome !== "Mesa Controladora DMX 512");
            if (limpa.length !== produtos.length) {
                produtos = limpa;
                localStorage.setItem("produtos", JSON.stringify(produtos));
            }
        }

        // Carrinho separado por usuário (uso genérico quando não há login ativo)
        function getCarrinho() {
            const usuarioEmail = localStorage.getItem("usuarioEmail") || "_anonimo";
            return JSON.parse(localStorage.getItem("carrinho_" + usuarioEmail)) || {};
        }

        function setCarrinho(carrinho) {
            const usuarioEmail = localStorage.getItem("usuarioEmail") || "_anonimo";
            localStorage.setItem("carrinho_" + usuarioEmail, JSON.stringify(carrinho));
        }

        let carrinho = getCarrinho();

        // Renderizar catálogo de produtos
        function renderProdutos() {
            const container = document.getElementById("produtos");
            if (!container) return;
            container.innerHTML = "";
            produtos.forEach((p, i) => {
                const card = document.createElement("div");
                card.className = "produto-card";
                const quantidadeNoCarrinho = carrinho[i] || 0;
                // botão desabilitado se não houver estoque disponível
                const podeAdicionar = p.estoque > 0 && quantidadeNoCarrinho < p.estoque;
                card.innerHTML = `
                        <img src="${p.foto}" alt="${p.nome}">
                        <h3>${p.nome}</h3>
                        <div class="preco">R$ ${p.preco},00/dia</div>
                        <p>Estoque: ${p.estoque}</p>
                        <button ${!podeAdicionar ? 'disabled' : ''} onclick="adicionarCarrinho(${i})">${podeAdicionar ? 'Adicionar ao Carrinho' : (p.estoque === 0 ? 'Esgotado' : 'Limite atingido')}</button>
                    `;
                container.appendChild(card);
            });
        }
        renderProdutos();

        // Atualiza automaticamente caso localStorage seja modificado em outra aba/página
        window.addEventListener('storage', () => {
            const dados = JSON.parse(localStorage.getItem("produtos")) || [];
            produtos = dados.filter(p => p.nome !== "Mesa Controladora DMX 512");
            renderProdutos();
        });

        // Adicionar ao carrinho (com verificação de estoque)
        function adicionarCarrinho(i) {
            const prod = produtos[i];
            if (!prod) return;
            if (!carrinho[i]) carrinho[i] = 0;
            if (carrinho[i] >= prod.estoque) {
                mostrarNotificacao(`⚠️ Limite de estoque atingido para ${prod.nome}`);
                renderProdutos();
                return;
            }
            carrinho[i]++;
            setCarrinho(carrinho);

            // Calcular total de itens no carrinho
            const totalItens = Object.values(carrinho).reduce((a, b) => a + b, 0);

            mostrarNotificacao(`✓ ${prod.nome} adicionado! (Total no carrinho: ${totalItens} ${totalItens === 1 ? 'item' : 'itens'})`);
            renderCarrinho();
            renderProdutos();
        }

        // Notificação
        function mostrarNotificacao(texto) {
            let notif = document.getElementById("notificacao");
            if (!notif) {
                notif = document.createElement("div");
                notif.id = "notificacao";
                notif.style.cssText = "position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: #00ffcc; color: #000; padding: 15px 20px; border-radius: 8px; z-index: 1000; font-weight: bold; box-shadow: 0 4px 10px #00000040;";
                document.body.appendChild(notif);
            }
            notif.textContent = texto;
            notif.style.display = "block";
            setTimeout(() => { notif.style.display = "none"; }, 2000);
        }

        // Atualizar resumo do carrinho (sidebar)
        function atualizarResumoCarrinho() {
            const resumoDiv = document.getElementById("resumoCarrinho");
            const resumoItens = document.getElementById("resumoItens");
            const resumoTotal = document.getElementById("resumoTotal");

            let totalItens = 0;
            let totalValor = 0;
            let itensTexto = [];

            for (let i in carrinho) {
                if (carrinho[i] > 0) {
                    totalItens += carrinho[i];
                    const subtotal = produtos[i].preco * carrinho[i];
                    totalValor += subtotal;
                    itensTexto.push(`${produtos[i].nome} (x${carrinho[i]})`);
                }
            }

            if (totalItens > 0) {
                resumoDiv.style.display = "block";
                resumoItens.innerHTML = itensTexto.map(item => `<div style="margin: 5px 0;">✓ ${item}</div>`).join("");
                resumoTotal.textContent = `Total: R$ ${totalValor},00`;
            } else {
                resumoDiv.style.display = "none";
            }
        }

        // Renderizar carrinho com botões para ajustar quantidade
        function renderCarrinho() {
            const lista = document.getElementById("listaItens");
            lista.innerHTML = "";
            let total = 0;

            for (let i in carrinho) {
                const quantidade = carrinho[i];
                const subtotal = produtos[i].preco * quantidade;
                const podeIncrementar = quantidade < produtos[i].estoque;
                const item = document.createElement("div");
                item.className = "item-carrinho";
                item.innerHTML = `
                    ${produtos[i].nome} 
                    <button class="quant-btn" onclick="decrementarItem(${i})">-</button>
                    <strong>${quantidade}</strong>
                    <button class="quant-btn" ${!podeIncrementar ? 'disabled' : ''} onclick="incrementarItem(${i})">+</button>
                    - R$ ${subtotal},00
                    <button class="excluir-btn" onclick="excluirItem(${i})">Excluir</button>
                `;
                lista.appendChild(item);
                total += subtotal;
            }

            document.getElementById("valorTotal").textContent = "Valor total: R$ " + total + ",00";
            atualizarResumoCarrinho();
        }
        renderCarrinho();

        // Aumenta quantidade do item (respeita estoque)
        function incrementarItem(i) {
            const prod = produtos[i];
            if (!prod) return;
            if (!carrinho[i]) carrinho[i] = 0;
            if (carrinho[i] >= prod.estoque) {
                mostrarNotificacao(`⚠️ Você já atingiu o estoque disponível para ${prod.nome}`);
                return;
            }
            carrinho[i]++;
            setCarrinho(carrinho);
            renderCarrinho();
            renderProdutos();
        }

        // Diminui quantidade do item (remove se chegar a zero)
        function decrementarItem(i) {
            if (!carrinho[i]) return;
            carrinho[i]--;
            if (carrinho[i] <= 0) {
                delete carrinho[i];
            }
            setCarrinho(carrinho);
            renderCarrinho();
            renderProdutos();
        }

        // Excluir item do carrinho
        function excluirItem(i) {
            delete carrinho[i];
            setCarrinho(carrinho);
            renderCarrinho();
        }

        // Finalizar reserva e enviar para WhatsApp
        function finalizarReserva() {
            const nome = document.getElementById("nome").value;
            const email = document.getElementById("email").value;
            const telefone = document.getElementById("telefone").value;
            const local = document.getElementById("local").value;
            const data = document.getElementById("data").value;
            const textoExtra = document.getElementById("textoExtra").value;

            if (!nome || !email || !telefone || !local || !data) {
                alert("Por favor, preencha todos os campos obrigatórios!");
                return;
            }

            let itens = "";
            let total = 0;
            for (let i in carrinho) {
                itens += `${produtos[i].nome} (x${carrinho[i]}) - R$ ${produtos[i].preco * carrinho[i]},00\n`;
                total += produtos[i].preco * carrinho[i];
            }

            // Salvar solicitação de orçamento no localStorage
            const solicitacao = {
                id: Date.now(),
                nome: nome,
                email: email,
                telefone: telefone,
                local: local,
                data: data,
                itens: itens,
                total: total,
                observacoes: textoExtra,
                status: "pendente",
                dataSolicitacao: new Date().toLocaleDateString('pt-BR')
            };

            // também enviar para o servidor para que o admin veja as solicitações
            fetch('http://localhost:3000/api/solicitacoes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(solicitacao)
            }).then(res => res.json()).then(resp => {
                if (!resp || !resp.sucesso) console.warn('Não foi possível salvar solicitação no servidor');
            }).catch(err => console.error('Erro ao enviar solicitação ao servidor:', err));

            // manter compatibilidade local (cópia local)
            let solicitacoes = JSON.parse(localStorage.getItem("solicitacoes_orcamento")) || [];
            solicitacoes.push(solicitacao);
            localStorage.setItem("solicitacoes_orcamento", JSON.stringify(solicitacoes));

            const mensagem =
                `Reserva EB Lighting\n\n` +
                `Nome: ${nome}\nEmail: ${email}\nTelefone: ${telefone}\nLocal: ${local}\nData: ${data}\n\n` +
                `Itens:\n${itens}\n` +
                `Valor total: R$ ${total},00\n\n` +
                `Observações: ${textoExtra}`;

            const numero = "554799206958";
            const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
            window.open(url, "_blank");

            // Limpar carrinho após enviar
            for (let i in carrinho) {
                delete carrinho[i];
            }
            setCarrinho(carrinho);
            renderCarrinho();
            document.getElementById("nome").value = "";
            document.getElementById("email").value = "";
            document.getElementById("telefone").value = "";
            document.getElementById("local").value = "";
            document.getElementById("data").value = "";
            document.getElementById("textoExtra").value = "";

            // Atualizar badge do carrinho se existir
            const carrinhoBadge = document.getElementById("carrinhoBadge");
            if (carrinhoBadge) {
                carrinhoBadge.style.display = "none";
            }

            alert("✅ Solicitação enviada com sucesso!\n\nO admin receberá sua proposta e entrará em contato em breve!");
        }

        // Atualizar resumo na carga da página
        window.addEventListener('load', () => {
            atualizarResumoCarrinho();
        });
    </script>
</body>

</html>
